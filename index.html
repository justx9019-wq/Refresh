<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد تجديد SideStore</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="script.js" defer></script>
</head>
<body class="bg-[#09090b] text-white font-sans min-h-screen flex flex-col items-center justify-between p-6 overflow-hidden relative">

    <div class="absolute top-[-10%] left-[-20%] w-[100vw] h-[100vw] rounded-full bg-[#1e1b4b] opacity-40 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-20%] w-[100vw] h-[100vw] rounded-full bg-[#0284c7] opacity-10 blur-[150px] pointer-events-none"></div>

    <header class="w-full max-w-md flex justify-between items-center z-10 pt-4">
        <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-xs text-zinc-400 font-medium tracking-wide">متصل بـ SideStore</span>
        </div>
        <div class="text-xs text-zinc-400">دورة الـ 5 أيام</div>
    </header>

    <main class="w-full max-w-md flex-1 flex flex-col justify-center items-center z-10 my-8">
        <div class="w-full apple-glass rounded-[32px] p-8 flex flex-col items-center justify-between min-h-[460px] shadow-2xl relative">
            
            <div class="text-center w-full">
                <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-b from-white to-zinc-400 bg-clip-text text-transparent">تتبع رخصة التطبيقات</h1>
                <p class="text-xs text-zinc-400 mt-1">إعادة الجدولة والمزامنة مع الاختصارات</p>
            </div>

            <div class="relative flex items-center justify-center my-6">
                <svg class="w-56 h-56">
                    <circle class="text-white/5" stroke-width="8" stroke="currentColor" fill="transparent" r="90" cx="112" cy="112"/>
                    <circle class="progress-ring-circle" id="progress-bar" stroke-width="8" stroke-dasharray="565.48" stroke-dashoffset="565.48" stroke-linecap="round" fill="transparent" r="90" cx="112" cy="112"/>
                </svg>
                <div class="absolute flex flex-col items-center text-center">
                    <span class="text-5xl font-black tracking-tight" id="days-count">0</span>
                    <span class="text-xs text-zinc-400 font-semibold mt-1" id="days-label">يوم</span>
                    <span class="text-sm font-medium mt-2 tracking-wider transition-colors duration-1000" id="sub-countdown">00:00:00</span>
                </div>
            </div>

            <div class="w-full grid grid-cols-2 gap-4 text-center my-2">
                <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                    <div class="text-[10px] text-zinc-400 mb-0.5">آخر تجديد</div>
                    <div class="text-xs font-semibold text-zinc-200" id="last-refresh-date">--/--/----</div>
                </div>
                <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                    <div class="text-[10px] text-zinc-400 mb-0.5">التجديد القادم</div>
                    <div class="text-xs font-semibold text-zinc-200" id="next-refresh-date">--/--/----</div>
                </div>
            </div>

            <div class="w-full flex flex-col gap-3 mt-4">
                <button id="refresh-btn" class="w-full py-4 rounded-2xl text-sm font-semibold text-white apple-btn-primary flex items-center justify-center gap-2">
                    <span>🔄 تم التجديد (إعادة المزامنة)</span>
                </button>
            </div>
        </div>
    </main>

    <footer class="w-full max-w-md text-center z-10 pb-4">
        <p class="text-[11px] text-zinc-500 leading-relaxed">
            عند الضغط على "تم التجديد"، سيتم تحديث العداد وفتح تطبيق الاختصارات تلقائياً لتحديث إشعارات نظام الآيباد.
        </p>
    </footer>

</body>
</html>
